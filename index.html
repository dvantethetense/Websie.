<script>
  const user = localStorage.getItem("chatUser");

  if (!user) {
    window.location.href = "login.html";
  }
</script>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Chat App</title>
    <style>
        body {
            font-family: Arial;
            background: #111;
            color: white;
            margin: 0;
            padding: 0;
        }
        #messages {
            height: 80vh;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
        }
        .msg {
            padding: 8px 12px;
            margin: 5px 0;
            border-radius: 8px;
            max-width: 70%;
            word-wrap: break-word;
        }
        #inputArea {
            display: flex;
            padding: 10px;
            background: #222;
        }
        #text {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 5px;
        }
        #sendBtn {
            padding: 10px 15px;
            margin-left: 10px;
            background: #4CAF50;
            border: none;
            border-radius: 5px;
            color: white;
        }
    </style>
</head>
<body>

<div id="messages"></div>

<div id="inputArea">
    <input id="text" placeholder="Type a message...">
    <button id="sendBtn">Send</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBaFj77OdvCXcJJzx4qHungfga3AW0TG70",
        authDomain: "global-chat-b766e.firebaseapp.com",
        projectId: "global-chat-b766e",
        storageBucket: "global-chat-b766e.firebasestorage.app",
        messagingSenderId: "1017328307314",
        appId: "1:1017328307314:web:056d4ab1c56e0a3d0506eb"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let username = prompt("Enter your username:");
    if (!username) username = "Anonymous";

    const userColors = {};
    function randomColor() {
        const colors = ["#2f7fff", "#2fbf4f", "#ff7f2f", "#bf2fff", "#ff2f6d", "#2ffff3", "#ffd12f", "#8f2fff"];
        return colors[Math.floor(Math.random() * colors.length)];
    }

    function addMessage(text, user) {
        const div = document.createElement("div");
        div.className = "msg";
        if (!userColors[user]) userColors[user] = randomColor();
        div.style.background = userColors[user];
        div.style.alignSelf = user === username ? "flex-end" : "flex-start";
        div.textContent = user + ": " + text;
        document.getElementById("messages").appendChild(div);
        div.scrollIntoView();
    }

    function checkDeleteCommand(text) {
        if (text.trim() === "#d*") {
            db.collection("messages").get().then(snapshot => {
                snapshot.forEach(doc => doc.ref.delete());
            });
            alert("All chat messages deleted.");
            return true;
        }
        return false;
    }

    document.getElementById("sendBtn").onclick = function () {
        const text = document.getElementById("text").value;

        if (checkDeleteCommand(text)) {
            document.getElementById("text").value = "";
            return;
        }

        if (text.trim() === "") return;

        db.collection("messages").add({
            text: text,
            user: username,
            time: Date.now()
        });

        document.getElementById("text").value = "";
    };

    db.collection("messages")
      .orderBy("time")
      .onSnapshot(snapshot => {
          document.getElementById("messages").innerHTML = "";
          snapshot.forEach(doc => {
              const data = doc.data();
              addMessage(data.text, data.user);
          });
      });
</script>

</body>
</html>

<button onclick="logout()">Logout</button>

<script>
  function logout() {
    localStorage.removeItem("chatUser");
    window.location.href = "login.html";
  }
</script>
